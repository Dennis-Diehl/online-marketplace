{% extends "base.html" %}

{% block content %}
<h1>Your Chats</h1>

<ul>
    {% for seller in sellers %}
    <li>
        <a href="{{ url_for('view_chat', seller_id=seller.seller_id) }}">
            Chat with {{ seller.seller_name }}
        </a>
    </li>
    {% endfor %}
</ul>

<form action="{{ url_for('start_chat') }}" method="POST">
    <label for="receiver_name">Start a new chat with:</label>
    <input type="text" name="receiver_name" id="receiver_name" placeholder="Enter username" required>
    <button type="submit">Start Chat</button>
</form>

{% endblock %}
