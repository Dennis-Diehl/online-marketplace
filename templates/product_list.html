{% extends 'base.html' %}

{% block title %}Products{% endblock %}

{% block content %}
    <section>
        <div class="filter-container">
            <button class="filter-button">Sort by</button>
            <div class="dropdown-menu">
                <a href="{{ url_for('product_list', sort_by='price_asc') }}">Price: Low to High</a>
                <a href="{{ url_for('product_list', sort_by='price_desc') }}">Price: High to Low</a>
                <a href="{{ url_for('product_list', sort_by='name_asc') }}">Name: A to Z</a>
                <a href="{{ url_for('product_list', sort_by='name_desc') }}">Name: Z to A</a>
            </div>
        </div>
        <div class="product-grid">
            <!-- Loop through products -->
            {% for product in products %}
                <div class="product-item">
                    <img src="{{ url_for('static', filename=product.source) }}" alt="{{ product.name }}">
                    <h3><a href="{{ url_for('product_detail', product_id=product.product_id) }}">{{ product.name }}</a></h3>
                    <p>${{ product['cost'] }}</p>
                </div>
            {% endfor %}
        </div>
    </section>
{% endblock %}
