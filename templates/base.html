<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}eBay Clone{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('product_list') }}">Products</a>
            <a href="{% if session['user_id'] %}{{ url_for('user_profile', user_id=session['user_id']) }}{% else %}{{ url_for('login') }}{% endif %}">Profile</a>
            <a href="{{ url_for('cart') }}">Cart</a>
            <a href="{{ url_for('checkout') }}">Checkout</a>
            <a href="{{ url_for('register') }}">Registrieren</a>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 eBay Clone</p>
    </footer>
</body>
</html>
