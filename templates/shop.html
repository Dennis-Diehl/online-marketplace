<!-- shop.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shop.shopname }}</title>
</head>
<body>
    <h1>Welcome to {{ shop.shopname }}</h1>
    <p>Shop URL: <a href="{{ shop.website_url }}" target="_blank">{{ shop.website_url }}</a></p>
    <h2>Products</h2>
    <ul>
        {% for product in products %}
            <li>
                <a href="{{ url_for('product_detail', product_id=product.product_id) }}">{{ product.name }}</a>
                - {{ product.cost }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
