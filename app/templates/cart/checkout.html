{% extends 'base.html' %}

{% block title %}Checkout{% endblock %}

{% block content %}
    <h1 class="page-title mb-4">Checkout</h1>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Order Summary</div>
                <ul class="list-group list-group-flush">
                    {% for item in cart_items %}
                        <li class="list-group-item d-flex justify-content-between">
                            <span>{{ item.name }}</span>
                            <span>{{ item.cost }} €</span>
                        </li>
                    {% endfor %}
                    <li class="list-group-item d-flex justify-content-between fw-bold fs-5 text-primary">
                        <span>Total</span>
                        <span>{{ total_cost }} €</span>
                    </li>
                </ul>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5 mb-3">Shipping &amp; Payment</h2>
                    <form method="post" action="{{ url_for('cart.checkout') }}">
                        <div class="mb-3">
                            <label for="address" class="form-label">Delivery Address</label>
                            <input type="text" class="form-control" id="address" name="address" required>
                        </div>
                        <div class="mb-3">
                            <label for="payment_method" class="form-label">Payment Method</label>
                            <select class="form-select" id="payment_method" name="payment_method">
                                <option value="credit_card">Credit Card</option>
                                <option value="paypal">PayPal</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Place Order</button>
                    </form>
                </div>
            </div>
            <a href="{{ url_for('cart.cart') }}" class="btn btn-outline-secondary mt-2">Back to Cart</a>
        </div>
    </div>
{% endblock %}
